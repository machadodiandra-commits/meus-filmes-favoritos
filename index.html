<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Filmes Favoritos</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER / NAVBAR -->
  <header class="navbar">
    <div class="navbar__left">
      <button class="navbar__menu-btn" id="menuToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <a href="#" class="navbar__logo">
        <svg class="logo-icon" viewBox="0 0 90 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="20" rx="5" fill="#E50914"/>
          <text x="4" y="15" font-size="13" font-weight="bold" fill="white" font-family="Roboto,sans-serif">▶</text>
        </svg>
        <span class="logo-text">MeusFilmes</span>
      </a>
    </div>

    <div class="navbar__center">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Pesquisar filmes..." autocomplete="off" />
        <button class="search-btn" id="searchBtn" aria-label="Buscar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="navbar__right">
      <button class="navbar__icon-btn" aria-label="Notificações">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <div class="navbar__avatar">M</div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar__nav">
      <a href="#" class="sidebar__item active" data-filter="all">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>Início</span>
      </a>
      <a href="#" class="sidebar__item" data-filter="acao">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2.05v2.02c3.95.49 7 3.85 7 7.93 0 3.21-1.81 6-4.72 7.28L13 17v5h5l-1.22-1.22C19.91 19.07 22 15.76 22 12c0-5.18-3.95-9.45-9-9.95zM11 2.05C5.95 2.55 2 6.82 2 12c0 3.76 2.09 7.07 5.22 8.78L6 22h5v-5l-2.28 2.28C7.81 18 6 15.21 6 12c0-4.08 3.05-7.44 7-7.93V2.05z"/></svg>
        <span>Ação</span>
      </a>
      <a href="#" class="sidebar__item" data-filter="drama">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z"/></svg>
        <span>Drama</span>
      </a>
      <a href="#" class="sidebar__item" data-filter="comedia">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
        <span>Comédia</span>
      </a>
      <a href="#" class="sidebar__item" data-filter="terror">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>
        <span>Terror</span>
      </a>
      <a href="#" class="sidebar__item" data-filter="ficcao">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.5 2C6.81 2 3 5.81 3 10.5S6.81 19 11.5 19h.5v3c4.86-2.34 8-7 8-11.5C20 5.81 16.19 2 11.5 2zm1 14.5h-2v-2h2v2zm0-4h-2c0-3.25 3-3 3-5 0-1.1-.9-2-2-2s-2 .9-2 2h-2c0-2.21 1.79-4 4-4s4 1.79 4 4c0 2.5-3 2.75-3 5z"/></svg>
        <span>Ficção Científica</span>
      </a>
      <a href="#" class="sidebar__item" data-filter="animacao">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 16c-3.86 0-7-3.14-7-7s3.14-7 7-7 7 3.14 7 7-3.14 7-7 7zm1-11h-2v3H8v2h3v3h2v-3h3v-2h-3z"/></svg>
        <span>Animação</span>
      </a>
      <div class="sidebar__divider"></div>
      <a href="#" class="sidebar__item" data-filter="favoritos">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <span>Favoritos</span>
      </a>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="mainContent">

    <!-- CHIPS / FILTROS RÁPIDOS -->
    <div class="chips-bar" id="chipsBar">
      <button class="chip active" data-filter="all">Todos</button>
      <button class="chip" data-filter="acao">Ação</button>
      <button class="chip" data-filter="drama">Drama</button>
      <button class="chip" data-filter="comedia">Comédia</button>
      <button class="chip" data-filter="terror">Terror</button>
      <button class="chip" data-filter="ficcao">Ficção Científica</button>
      <button class="chip" data-filter="animacao">Animação</button>
      <button class="chip" data-filter="favoritos">❤ Favoritos</button>
    </div>

    <!-- GRID DE FILMES -->
    <section class="movies-grid" id="moviesGrid">
      <!-- Cards gerados via JS -->
    </section>

    <!-- ESTADO VAZIO -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <h3>Nenhum filme encontrado</h3>
      <p>Tente outro termo de busca ou filtro.</p>
    </div>

  </main>

  <!-- MODAL DE DETALHES -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal__close" id="modalClose" aria-label="Fechar">✕</button>
      <div class="modal__banner" id="modalBanner"></div>
      <div class="modal__body">
        <div class="modal__header">
          <div>
            <h2 class="modal__title" id="modalTitle"></h2>
            <div class="modal__meta" id="modalMeta"></div>
          </div>
          <button class="modal__fav-btn" id="modalFavBtn" aria-label="Favoritar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
        </div>
        <p class="modal__desc" id="modalDesc"></p>
        <div class="modal__tags" id="modalTags"></div>
        <div class="modal__actions">
          <button class="btn btn--primary" id="modalPlayBtn">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Assistir Agora
          </button>
          <button class="btn btn--secondary" id="modalListBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Minha Lista
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
